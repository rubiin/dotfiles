---
backup:
  downgrade:
  enabled: true
  install:
  mode: incremental
  remove_method: self
  type: rsync
  uninstall:
  upgrade:
boot:
  load_apps: true
disk:
  trim:
    after_upgrade: false
download:
  check_ssl: true
  icons: true
  multithreaded: false
  multithreaded_client:
gems:
locale:
memory_cache:
  data_expiration: 3600
  icon_expiration: 300
store_root_password: true
suggestions:
  by_type: 15
  enabled: true
system:
  notifications: true
  single_dependency_checking: false
ui:
  auto_scale: false
  hdpi: true
  qt_style: fusion
  scale_factor: 1.0
  system_theme: false
  table:
    max_displayed: 50
  theme: darcula
  tray:
    default_icon:
    updates_icon:
updates:
  ask_for_reboot: true
  check_interval: 5
