windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}



windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}


# Disable blur for xwayland context menus
windowrule = match:class ^()$, match:title ^()$, no_blur on

# Disable blur for every window
windowrule = match:class .*, no_blur o

# MPV
windowrule {
  name = mpv-rules
  match:class = ^(.*mpv.*)
  float = on
  center= on 
  size = 70% 70%
}


# Dolphin
windowrule {
  name = dolphin-dialogs
  match:class = ^(org.kde.dolphin)$
  match:title = ^(Copying — Dolphin)$|^(Progress Dialog — Dolphin)
  size = 600 250
}


# Zathura
windowrule {
  name = zathura-rules
  match:class = ^(.*zathura.*)$
  float = on
  center = on
  size = 45% 90%
}

 # Stacer
windowrule {
  name = stacer-rules
  match:class = ^(.*stacer.*)$
  float = on
  center = on
  size = 45% 60%
}


# kcalc
windowrule {
  name = kcalc-rules
  match:class = ^(org.kde.kcalc)$
  float = on
  center = on
  size = 500 700
}

# MissionCenter
windowrule {
  name = missioncenter-rules
  match:class = ^(io.missioncenter.MissionCenter)$
  float = on
  center = on
  size = 700 600
}

# Persepolis
windowrule {
  name = perspolis-rules
  match:class = ^(com.github.persepolisdm.persepolis)$
  float = on
  center = on
  size = 50% 50%
  workspace = special
}

windowrule = size 800 500, match:class ^(com.github.persepolisdm.persepolis)$, match:title ^(Add Download Link)$ 


# Ktorrent
windowrule {
  name = ktorrent-rules
  match:class = ^(org.kde.ktorrent)$
  float = on
  center = on
  size = 1000 700
  workspace = special
}
windowrule = size 800 500, match:class ^(org.kde.ktorrent)$, match:title ^(Open an URL — KTorrent)$ 


windowrule {
  name = opaque-windows
  match:class = ^(code-insiders-url-handler)$|^(code-insiders)$|^(vivaldi-stable)$|^(zen)$|^(com.gabm.satty)$|^(vlc)$|^(.*mpv.*)$
  opaque = on
}

windowrule {
  name = subtle-opacity-terminals
  match:class = ^(kitty)$|^(io.missioncenter.MissionCenter)$|^(org.wezfurlong.wezterm)$
  opacity = 0.98 1
}


# Picture-in-Picture
windowrule {
  name = picture-in-picture
  match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
  float = on
  pin = on
  keep_aspect_ratio = on
  move = 73% 72%
  size = 25%
}


# workspace locked apps

# Internet
windowrule {
  name = browsers-workspace-1
  match:class = ^(.*firefox.*)$|^(vivaldi-stable)$|^(.*opera.*)$|^(.*edge.*)$|^(.*Chromium.*)$|^(.*Google-chrome.*)$|^(.*thorium-browser.*)$|^(.*Brave-browser.*)$|^(.*zen.*)$
  workspace = 1
}


# Terminals
windowrule {
  name = terminal-systemsettings-workspace-2
  match:class = .*konsole.*|.*kitty.*|.*systemsettings.*|.*gnome-terminal.*
  workspace = 2
}

# Coding
windowrule {
  name = vscode-workspace-3
  match:class = ^(Code)$|^(code-oss)$|^(code-url-handler)$|^(code-insiders-url-handler)$|^(code-insiders)$|^(Code - Insiders)$
  workspace = 3
}

# Database and stuffs
windowrule {
  name = workspace-4-tools
  match:class = ^(.*studio.*)$|^(.*jetbrains-studio.*)$|^(.*DBeaver.*)$|^(Postman)$|^(obsidian)$|^(MongoDB Compass)$
  match:title = ^(.*LibreOffice.*)$|^(.*pgadmin4.*)$
  workspace = 4
}


# Files
windowrule {
  name = workspace-5-filemanagers
  match:class = ^(.*dolphin.*)$|^(.*pcmanfm-qt.*)$|^(.*nemo.*)$|^(.*ark.*)$|.*Nautilus.*
  workspace = 5
}

# Media
windowrule {
  name = workspace-6-media
  match:class = ^(.*amarok.*)$|^(.*G4Music.*)$|.*music.*|.*lollypop.*|^(.*elisa.*)$|^(.*vlc.*)$|^(.*easyeffects.*)$|^(.*mpv.*)$|^(.*strawberry.*)$|^(com.github.rafostar.Clapper)$|^(Spotify)$|^(Audacity)$
  workspace = 6
}

# Chatting
windowrule {
  name = workspace-7-communication
  match:class = ^(ferdium)$|^(Station)$|^(.*discord.*)$|^(.*thunderbird.*)$
  match:title = ^(.*Telegram.*)$|^(.*Messages for web.*)$
  workspace = 7
}

# Games
windowrule {
  name = workspace-8-gaming
  match:class = ^(.*org.libretro.RetroArch.*)$|^(.*pcsx2-qt.*)$|.*PCSX2.*|^(.*PPSSPPQt.*)$|^(.*steam.*)$
  match:title = ^(.*Winetricks.*)$|^(Waydroid)$
  workspace = 8
}


# for window shallow similar to devour
misc {

# enable_swallow = true
swallow_regex = (foot|kitty|alacritty|Alacritty|ghostty|Ghostty)

}

# Cycle through applications on active workspace
bind = ALT, Tab, cyclenext
bind = ALT, Tab, bringactivetotop


# Don't show update on first launch
ecosystem {
  no_update_news = true
}


layerrule {
  name = tsumiki-notifications
  match:namespace = tsumiki-notifications
  blur = on
  xray = on
  blur_popups = on
  ignore_alpha = 0
  no_anim = on
}


layerrule {
  name = fabric-layer
  match:namespace = fabric
  blur = on
  ignore_alpha = 0
  xray = on
  blur_popups = on
}

layerrule {
  name = tsumiki-layer
  match:namespace = tsumiki
  blur = on
  xray = on
  blur_popups = on
  ignore_alpha = 0
}

layerrule {
  name = gtk-layer-shell
  match:namespace = gtk-layer-shell
  blur = on
  ignore_alpha = 0
}

layerrule {
  name = launcher-layer
  match:namespace = launcher
  blur = on
  xray = on
  blur_popups = on
  ignore_alpha = 0
  animation = popin
}

