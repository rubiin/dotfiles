<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- ==========================================================
       SERIF FONTS
       Used in:
         • Documents
         • PDFs
         • Browsers when serif is requested
       ========================================================== -->
  <alias>
    <family>serif</family>
    <prefer>

      <!-- Classic TeX-style serif -->
      <family>CMU Serif</family>

      <!-- Main Unicode-safe serif -->
      <family>Noto Serif</family>

      <!-- Condensed fallback serif -->
      <family>DejaVu Serif Condensed</family>

      <!-- System fallback serif -->
      <family>Liberation Serif</family>

      <!-- Emoji support inside serif text -->
      <family>Noto Color Emoji</family>

    </prefer>
  </alias>


  <!-- ==========================================================
       SANS-SERIF FONTS
       Used in:
         • Desktop UI
         • Web pages
         • GTK/Qt apps
       ========================================================== -->
  <alias>
    <family>sans-serif</family>
    <prefer>

      <!-- Primary UI font -->
      <family>Noto Sans</family>

      <!-- Common web fallback -->
      <family>Open Sans</family>

      <!-- System fallback -->
      <family>DejaVu Sans Condensed</family>

      <!-- Nerd Font icons for UI apps (non-terminal) -->
      <family>Symbols Nerd Font</family>

      <!-- Emoji support -->
      <family>Noto Color Emoji</family>

    </prefer>
  </alias>


  <!-- ==========================================================
       MONOSPACE FONTS (MOST IMPORTANT)
       Used in:
         • Terminals (Kitty, Ghostty, WezTerm)
         • Code editors (Neovim, VS Code, Emacs)
         • Shell prompts (Starship, Powerlevel10k)

       ORDER MATTERS:
         Top = primary font
         Bottom = last fallback
       ========================================================== -->
  <alias>
    <family>monospace</family>
    <prefer>

      <!-- ======================================================
           PRIMARY CODING FONT
           ====================================================== -->
      <family>MonoLisa</family>

      <!-- ======================================================
           FALLBACK CODING FONT (NERD FONT)
           JetBrains Mono Nerd Font is used when MonoLisa
           does not contain required glyphs.
           ====================================================== -->
      <family>JetBrainsMono Nerd Font Mono</family>
      <family>JetBrainsMono Nerd Font</family>

      <!-- ======================================================
           ICON / GLYPH FONT (CRITICAL FOR TERMINALS)
           Ensures Nerd Font symbols render correctly.
           Mono version ensures alignment in terminal grids.
           ====================================================== -->
      <family>Symbols Nerd Font Mono</family>

      <!-- Optional fallback for missing glyph coverage -->
      <family>Symbols Nerd Font</family>

      <!-- ======================================================
           UNICODE SAFETY NET
           Used when fonts above lack characters
           ====================================================== -->
      <family>Noto Sans Mono</family>
      <family>Liberation Mono</family>

      <!-- Emoji support inside terminal/editor -->
      <family>Noto Color Emoji</family>

    </prefer>
  </alias>


  <!-- ==========================================================
       FONT AWESOME
       Used when apps explicitly request FontAwesome fonts
       ========================================================== -->
  <alias>
    <family>FontAwesome</family>
    <prefer>
      <family>Font Awesome 6 Free</family>
      <family>FontAwesome</family>
    </prefer>
  </alias>


  <!-- ==========================================================
       GENERIC NERD FONT ALIAS
       Used when apps request "Nerd Font" generically
       ========================================================== -->
  <alias>
    <family>Nerd Font</family>
    <prefer>

      <!-- Terminal-safe icon font -->
      <family>Symbols Nerd Font Mono</family>

      <!-- Optional fallback -->
      <family>Symbols Nerd Font</family>

      <!-- JetBrains Nerd fallback -->
      <family>JetBrainsMono Nerd Font Mono</family>

    </prefer>
  </alias>

</fontconfig>