<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- ==========================================================
       SERIF FONTS
       Used by:
         • Documents
         • PDF viewers
         • Web browsers when serif is requested
       Priority:
         1. CMU Serif          → TeX/academic style
         2. Noto Serif         → Broad Unicode coverage
         3. DejaVu Serif Condensed
         4. Liberation Serif   → Last-resort fallback
         5. Noto Color Emoji   → Emoji support
       ========================================================== -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>CMU Serif</family>
      <family>Noto Serif</family>
      <family>DejaVu Serif Condensed</family>
      <family>Liberation Serif</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>


  <!-- ==========================================================
       SANS-SERIF FONTS
       Used by:
         • Desktop applications
         • Browsers
         • GTK/Qt interfaces
         • General UI rendering

       Notes:
         • Symbols Nerd Font provides Nerd Font glyphs/icons.
         • The non-Mono variant is acceptable here because
           alignment is usually not critical in proportional text.
         • Emoji are kept last to avoid replacing normal text.
       ========================================================== -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Open Sans</family>
      <family>DejaVu Sans Condensed</family>

      <!-- Nerd Font icon fallback -->
      <family>Symbols Nerd Font</family>

      <!-- Emoji fallback -->
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>


  <!-- ==========================================================
       MONOSPACE FONTS (MOST IMPORTANT)
       Used by:
         • Terminals (Kitty, WezTerm, Alacritty)
         • Editors (Neovim, VS Code, Emacs)
         • Shell prompts (Starship, Powerlevel10k)

       Priority:
         1. MonoLisa
            Primary coding font.

         2. Symbols Nerd Font Mono
            Dedicated Nerd Font symbols.
            All glyphs occupy exactly one terminal cell.

         3. DejaVuSansM Nerd Font Mono
            Additional Nerd Font glyph coverage.

         4. Noto Sans Mono
            Unicode safety net.

         5. Liberation Mono
            Final fallback.

         6. Noto Color Emoji
            Emoji support in terminals.
       ========================================================== -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>MonoLisa</family>

      <!-- Single-cell Nerd Font glyphs -->
      <family>Symbols Nerd Font Mono</family>

      <!-- Extra Nerd Font coverage -->
      <family>DejaVuSansM Nerd Font Mono</family>

      <family>Noto Sans Mono</family>
      <family>Liberation Mono</family>

      <!-- Emoji fallback -->
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>


  <!-- ==========================================================
       FONT AWESOME
       Used by applications explicitly requesting FontAwesome.
       ========================================================== -->
  <alias>
    <family>FontAwesome</family>
    <prefer>
      <family>Font Awesome 6 Free</family>
      <family>FontAwesome</family>
    </prefer>
  </alias>


  <!-- ==========================================================
       GENERIC NERD FONT ALIAS

       Allows applications requesting "Nerd Font" to receive
       a reliable monospace Nerd Font implementation.

       Mono variant is preferred to prevent icon misalignment
       in terminals and prompts.
       ========================================================== -->
  <alias>
    <family>Nerd Font</family>
    <prefer>
      <family>Symbols Nerd Font Mono</family>
      <family>DejaVuSansM Nerd Font Mono</family>
    </prefer>
  </alias>

</fontconfig>