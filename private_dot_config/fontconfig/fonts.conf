<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

  <!-- =========================
       SERIF FONTS
       Used for: documents, browsers, PDFs
       ========================= -->
  <alias>
    <family>serif</family>
    <prefer>
    <family>CMU Serif</family>
      <family>Noto Serif</family>
      <family>DejaVu Serif Condensed</family>
      <family>Liberation Serif</family>
    </prefer>
  </alias>

  <!-- =========================
       SANS-SERIF FONTS
       Used for: UI, web, general apps
       Nerd fallback ensures symbols/icons render properly
       ========================= -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>DejaVuSansM Nerd Font Propo</family>
      <family>Noto Sans</family>
      <family>Open Sans</family>
      <family>DejaVu Sans Condensed</family>
    </prefer>
  </alias>

  <!-- =========================
       MONOSPACE FONTS (CRITICAL)
       Used for: terminal, editors, coding
       Priority order:
         1. MonoLisa Nerd Font → primary coding font
         2. Symbols Nerd Font Mono → icons/symbols fallback
         3. DejaVuSansM Nerd Font Mono → additional Nerd glyphs
         4. Noto Sans Mono → Unicode safety net
         5. Liberation Mono → final fallback
       ========================= -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>MonoLisa Nerd Font</family>
      <family>Symbols Nerd Font Mono</family>
      <family>DejaVuSansM Nerd Font Mono</family>
      <family>Noto Sans Mono</family>
      <family>Liberation Mono</family>
    </prefer>
  </alias>

  <!-- =========================
       EMOJI FONTS
       Separate from text to avoid breaking layout
       ========================= -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
      <family>JoyPixels</family>
    </prefer>
  </alias>

  <!-- =========================
       ICON FONTS
       Used by terminals, prompts (Powerlevel10k, Starship)
       ========================= -->
  <alias>
    <family>FontAwesome</family>
    <prefer>
      <family>Font Awesome 6 Free</family>
      <family>FontAwesome</family>
    </prefer>
  </alias>

  <!-- =========================
       GENERIC NERD FONT ALIAS
       ========================= -->
  <alias>
    <family>Nerd Font</family>
    <prefer>
      <family>MonoLisa Nerd Font</family>
      <family>Symbols Nerd Font Mono</family>
      <family>DejaVuSansM Nerd Font Mono</family>
    </prefer>
  </alias>

</fontconfig>