<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

  <!-- =========================
       SERIF FONTS
       Used for: documents, browsers, PDFs
       Nerd fallback included for icon support in text if needed
       ========================= -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>DejaVu Serif Condensed</family> <!-- Nerd-compatible serif -->
      <family>Noto Serif</family>             <!-- Unicode safety fallback -->
    </prefer>
  </alias>

  <!-- =========================
       SANS-SERIF FONTS
       Used for: UI, web, general apps
       Nerd fallback ensures symbols/icons render properly
       ========================= -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>DejaVuSansM Nerd Font Propo</family> <!-- Primary Nerd Sans -->
      <family>DejaVu Sans Condensed</family>       <!-- Regular fallback -->
    </prefer>
  </alias>

  <!-- =========================
       MONOSPACE FONTS (CRITICAL)
       Used for: terminal, editors, coding
       Priority order:
         1. MonoLisa Nerd Font → primary coding font
         2. DejaVuSansM Nerd Font Mono → fallback for symbols/icons
         3. Noto Sans Mono → wide Unicode safety net
       ========================= -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>MonoLisa Nerd Font</family>             <!-- Main coding font -->
      <family>DejaVuSansM Nerd Font Mono</family>    <!-- Nerd fallback -->
      <family>Noto Sans Mono</family>                <!-- Unicode fallback -->
    </prefer>
  </alias>

  <!-- =========================
       EMOJI FONTS
       Separate from text to avoid breaking layout
       Priority:
         1. Joy Pixels → modern emoji
         2. Noto Color Emoji → full coverage fallback
       ========================= -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Joy Pixels</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- =========================
       ICON FONTS
       Used by terminals, prompts (Powerlevel10k, Starship)
       Explicit alias ensures FontAwesome is picked when requested
       ========================= -->
  <alias>
    <family>FontAwesome</family>
    <prefer>
      <family>FontAwesome</family>
    </prefer>
  </alias>

</fontconfig>
