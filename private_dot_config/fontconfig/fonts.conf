<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- ========================= -->
  <!-- RENDERING TWEAKS -->
  <!-- ========================= -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

  <!-- ========================= -->
  <!-- MONOSPACE / DEV FONTS -->
  <!-- ========================= -->
  <alias>
    <family>monospace</family>
    <prefer>
      <!-- Primary dev font -->
      <family>MonoLisa Nerd Font</family>
      <!-- Fallback dev fonts -->
      <family>JetBrains Mono Nerd</family>
      <family>FiraCode Nerd</family>
      <family>Hack Nerd</family>
      <family>Ubuntu Mono Nerd</family>
      <!-- System fallback monospace -->
      <family>DejaVu Sans Mono</family>
      <family>Bitstream Vera Sans Mono</family>
    </prefer>
  </alias>

  <!-- ========================= -->
  <!-- SANS-SERIF / GUI APPS -->
  <!-- ========================= -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Liberation Sans</family>
      <family>Roboto</family>
      <family>Open Sans</family>
      <family>Noto Sans</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Liberation Serif</family>
      <family>Noto Serif</family>
      <family>DejaVu Serif</family>
    </prefer>
  </alias>

  <!-- ========================= -->
  <!-- EMOJI / SYMBOLS -->
  <!-- ========================= -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>JoyPixels</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Force emoji fallback globally -->
  <match target="pattern">
    <edit name="family" mode="append">
      <string>Twemoji</string>
    </edit>
    <edit name="family" mode="append">
      <string>JoyPixels</string>
    </edit>
    <edit name="family" mode="append">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- Ensure Nerd Font symbols fallback properly -->
  <match target="pattern">
    <test name="family" compare="contains">
      <string>Nerd</string>
    </test>
    <edit name="family" mode="append">
      <string>ttf-nerd-fonts-symbols-common</string>
    </edit>
  </match>

  <!-- ========================= -->
  <!-- OPTIONAL: Ligatures -->
  <!-- ========================= -->
  <!-- Uncomment below to disable ligatures if desired -->
  <!--
  <match target="font">
    <edit name="fontfeatures" mode="assign">
      <string>liga=0</string>
    </edit>
  </match>
  -->

</fontconfig>
